name: Supabase Keepalive

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query cases table to keep Supabase project active
        run: |
          curl -sSf \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/cases?select=id&user_id=is.null&limit=1"
